# ============================================================
# SAPT - Production Profile
# Active when: spring.profiles.active=prod
# ============================================================

# Disable SQL logging in production
spring.jpa.show-sql=false

# Validate only - no DDL changes in production
spring.jpa.hibernate.ddl-auto=validate

# Minimal logging in production
logging.level.com.sapt=WARN
logging.level.org.springframework=ERROR

# CORS - restrict to production frontend domain only
sapt.cors.allowed-origins=${ALLOWED_ORIGINS:https://your-frontend-domain.com}
