# ============================================================
# SAPT - Student Activity Point Tracker
# Main Application Properties
# All sensitive values are read from .env via dotenv-java.
# DO NOT hardcode credentials here.
# ============================================================

# --- Active Profile ---
spring.profiles.active=${APP_ENV:dev}

# --- Server ---
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# --- Application Name ---
spring.application.name=sapt-backend

# --- MySQL DataSource ---
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- MongoDB ---
spring.data.mongodb.uri=${MONGO_URI}
spring.data.mongodb.database=${MONGO_DATABASE}

# --- JWT ---
sapt.jwt.secret=${JWT_SECRET}
sapt.jwt.expiration=${JWT_EXPIRATION:86400000}

# --- Mail (SMTP) ---
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# --- File Upload ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# --- Logging ---
logging.level.com.sapt=DEBUG
logging.level.org.springframework.security=INFO
logging.file.name=logs/sapt.log
