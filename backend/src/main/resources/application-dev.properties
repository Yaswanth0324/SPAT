# ============================================================
# SPAT - Development Profile
# Active when: spring.profiles.active=dev
# ============================================================

# Show SQL in console during development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DDL auto - update for dev (auto-creates new tables such as colleges)
# Hibernate may warn about "Unsupported modify column" on PK columns — this is harmless.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.hbm2ddl.halt_on_error=false

# More verbose logging in dev
logging.level.com.sapt=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS - allow all origins in dev (restrict in prod)
sapt.cors.allowed-origins=http://localhost:5173,http://localhost:3000
