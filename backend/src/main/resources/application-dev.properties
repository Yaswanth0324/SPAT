# ============================================================
# SAPT - Development Profile
# Active when: spring.profiles.active=dev
# ============================================================

# Show SQL in console during development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DDL auto - update for dev
spring.jpa.hibernate.ddl-auto=update

# More verbose logging in dev
logging.level.com.sapt=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS - allow all origins in dev (restrict in prod)
sapt.cors.allowed-origins=http://localhost:5173,http://localhost:3000
